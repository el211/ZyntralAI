spring:
  application:
    name: zyntral-ai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/zyntral}
    username: ${DB_USER:zyntral}
    password: ${DB_PASSWORD:zyntral}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # schema owned by Flyway, never auto-mutated
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS:true}
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  forward-headers-strategy: framework   # behind Nginx

# ---- application-specific config ----
zyntral:
  admin:
    username: ${ADMIN_PANEL_USERNAME:admin}
    password: ${ADMIN_PANEL_PASSWORD:}      # blank disables admin-panel login
  crypto:
    secret: ${CRYPTO_SECRET:dev-only-crypto-secret-change-me-in-production}
  web-url: ${WEB_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:no-reply@zyntral.ai}
  jwt:
    issuer: zyntral-ai
    secret: ${JWT_SECRET:change-me-in-prod-use-a-256-bit-secret-value-here!!}
    access-token-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${JWT_REFRESH_TTL:P30D}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  ai:
    default-provider: ${AI_DEFAULT_PROVIDER:ANTHROPIC}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${ANTHROPIC_MODEL:claude-opus-4-8}
      base-url: https://api.anthropic.com/v1
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o}
      base-url: https://api.openai.com/v1
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.0-flash}
      base-url: https://generativelanguage.googleapis.com/v1beta
    veo:
      api-key: ${VEO_API_KEY:${GEMINI_API_KEY:}}
      model: ${VEO_MODEL:veo-3.1-generate-preview}
      base-url: https://generativelanguage.googleapis.com/v1beta
    elevenlabs:
      api-key: ${ELEVENLABS_API_KEY:}
      model: ${ELEVENLABS_MODEL:eleven_multilingual_v2}
      voice-id: ${ELEVENLABS_VOICE_ID:21m00Tcm4TlvDq8ikWAM}
      base-url: https://api.elevenlabs.io/v1
  storage:
    s3:
      endpoint: ${S3_ENDPOINT:}
      region: ${S3_REGION:us-east-1}
      bucket: ${S3_BUCKET:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
  payments:
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    paypal:
      client-id: ${PAYPAL_CLIENT_ID:}
      client-secret: ${PAYPAL_CLIENT_SECRET:}
      base-url: ${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
  social:
    redirect-base-url: ${SOCIAL_REDIRECT_BASE_URL:http://localhost:8080}
    web-redirect-url: ${WEB_URL:http://localhost:3000}/dashboard/social
    linkedin:
      client-id: ${LINKEDIN_CLIENT_ID:}
      client-secret: ${LINKEDIN_CLIENT_SECRET:}
    twitter:
      client-id: ${TWITTER_CLIENT_ID:}
      client-secret: ${TWITTER_CLIENT_SECRET:}
    facebook:
      client-id: ${FACEBOOK_CLIENT_ID:}
      client-secret: ${FACEBOOK_CLIENT_SECRET:}
    instagram:
      client-id: ${INSTAGRAM_CLIENT_ID:${FACEBOOK_CLIENT_ID:}}
      client-secret: ${INSTAGRAM_CLIENT_SECRET:${FACEBOOK_CLIENT_SECRET:}}
    tiktok:
      client-id: ${TIKTOK_CLIENT_KEY:}
      client-secret: ${TIKTOK_CLIENT_SECRET:}
    youtube:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
    pinterest:
      client-id: ${PINTEREST_CLIENT_ID:}
      client-secret: ${PINTEREST_CLIENT_SECRET:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

logging:
  level:
    com.zyntral: INFO
